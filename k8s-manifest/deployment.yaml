apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      # ✅ Fix 1: Disable automounting service account
      automountServiceAccountToken: false
      containers:
      - name: flask-app
        image: tanishabadole28/flask-app:1
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_HOST
          value: "0.0.0.0"
        # ✅ Fix 2: Add resource limits and requests
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
