apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/badoletanisha/QuantumShield-DevSecOps.git
    targetRevision: deploy
    path: k8s-manifest

  destination:
    server: https://kubernetes.default.svc
    namespace: flask

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
